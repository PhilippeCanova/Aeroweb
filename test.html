function test(){
  
  $('#vue_trajet').modal('open');

function onload(){
  $(document).ready(function () {
		$('select').formSelect();
		$('.sidenav').sidenav({ edge: 'right', draggable: false });
		$('.collapsible').collapsible();
		$('.fixed-action-btn').floatingActionButton({ direction: 'left' });
		$(".dropdown-trigger").dropdown();
    //$('.modal').modal();
    
		$('#vue_trajet').modal({onOpenEnd:function(){
			$('#vue_trajet_ol').html('');
			var extent = [0, 0, 774, 649];
			var projection = new ol.proj.Projection({
				code: 'xkcd-image',
				units: 'pixels',
				extent: extent
			  });
			  
			var map = new ol.Map({
				target: 'vue_trajet_ol',
				layers: [
					new ol.layer.Image({
						source: new ol.source.ImageStatic({
						  url: 'http://aviation.meteo.fr/wms/vertical-section/path/48.82133254964663/-2.0434570312499996/47.561700754519734/0.35156250000000083/1588075200/1/100/hu,uv_alt?v=0.6111933116089481',
              projection: projection,
              crossOrigin : null,
						  imageExtent: extent
						}),
						
					})
				],
				view: new ol.View({
				  projection: projection,
				  center: ol.extent.getCenter(extent),
				  zoom: 2,
				  maxZoom: 8
				})
			  });

    }});
    
	});
}
  </script>
</head>

<body onload="onload();">
